<!doctype html>
<html lang="en" dir="ltr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly - Freelancer Template</title>
<link rel="icon" type="image/png" href="../assets/images/brush-solid.png">

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>

<section class="register-hero">

<div class="register-overlay"></div>

<div class="container">

<div class="register-brand">
<a href="../pages/index.html" class="logo login-logo">
<img src="../assets/images/brush-solid.png" alt="Freelancer logo">
<span>Freelancer</span>
</a>
</div>

<div class="register-grid">

<!-- Left Content -->

<div class="register-content">

<h1>Create Your Account</h1>

<p>
Join our freelancer platform to showcase your
creative work, connect with clients, and grow
your professional portfolio.
</p>

</div>


<!-- Register Form -->

<div class="register-form-card">

<h2>Sign Up</h2>

<form>

<div class="form-group">
<input type="text" placeholder="Full Name" required>
</div>

<div class="form-group">
<input type="email" placeholder="Email Address" required>
</div>

<div class="form-group">
<input type="password" placeholder="Password" required>
</div>

<div class="form-group">
<input type="password" placeholder="Confirm Password" required>
</div>

<button type="submit" class="register-btn">
Create Account
</button>

<div class="register-divider">
<span>OR</span>
</div>

<div class="social-register">

<button class="google-btn">Sign Up with Google</button>

<button class="facebook-btn">Sign Up with Facebook</button>

</div>

<p class="login-text">
Already have an account?
<a href="login.html">Login</a>
</p>

</form>

</div>

</div>

</div>

</section>
</body>
</html>
