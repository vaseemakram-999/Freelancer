<!doctype html>
<html lang="en" dir="ltr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly - Freelancer Template</title>
<link rel="icon" type="image/png" href="../assets/images/brush-solid.png">

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link rel="stylesheet" href="../assets/css/rtl.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>
<section class="login-hero">

<div class="login-overlay"></div>

<div class="container">

<div class="login-brand">
<a href="../pages/index.html" class="logo login-logo">
<img src="../assets/images/brush-solid.png" alt="Freelancer logo">
<span>Freelancer</span>
</a>
</div>

<div class="login-grid">

<!-- Left Content -->

<div class="login-content">

<h1>Welcome Back</h1>

<p>
Login to your freelancer dashboard to manage
projects, clients, and creative work.
</p>

</div>


<!-- Login Form -->

<div class="login-form-card">

<h2>Login</h2>

<form>

<div class="form-group">
<input type="email" placeholder="Email Address" required>
</div>

<div class="form-group">
<input type="password" placeholder="Password" required>
</div>

<div class="form-options">

<label>
<input type="checkbox"> Remember me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit" class="login-btn">
Login
</button>

<div class="login-divider">
<span>OR</span>
</div>

<div class="social-login">

<button class="google-btn">Login with Google</button>

<button class="facebook-btn">Login with Facebook</button>

</div>

<p class="signup-text">
Don't have an account?
<a href="register.html">Sign Up</a>
</p>

</form>

</div>

</div>

</div>

</section>
</body>
</html>
